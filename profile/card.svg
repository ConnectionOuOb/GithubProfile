            width="160.5" height="44" rx="10"
            fill="#388bfd26"
            stroke="rgba(255,255,255,0.08)"
            stroke-width="1"
          />
          <text
            x="80.25" y="20"
            text-anchor="middle"
            fill="#e6edf3"
            font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace"
