      <line x1="472" y1="0" x2="472" y2="52" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text
        x="360" y="0"
        text-anchor="middle"
        fill="#e6edf3"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="30"
        font-weight="700"
        letter-spacing="-0.5"
      >9</text>
      <text
        x="360" y="24"
        text-anchor="middle"
        fill="#8b949e"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="0.2"
