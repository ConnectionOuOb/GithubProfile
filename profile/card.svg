<svg
  xmlns="http://www.w3.org/2000/svg"
  width="720"
  height="210"
  viewBox="0 0 720 210"
  role="img"
  aria-label="GitHub profile stats for username"
>
  <title>Your Name (@username) — GitHub Profile</title>
  
    <defs>
      <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#58a6ff"/><stop offset="50%" stop-color="#a371f7"/><stop offset="100%" stop-color="#f778ba"/>
      </linearGradient>
      <linearGradient id="bg-fade" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#161b22" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <rect width="720" height="3" fill="url(#accent)" rx="1.5"/>
  

  <rect
    x="0.5" y="3.5"
    width="719" height="206"
    rx="14" ry="14"
    fill="#0d1117"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="1"
  />
  <rect
    x="0.5" y="3.5"
    width="719" height="80"
    rx="14" ry="14"
    fill="url(#bg-fade)"
  />

  <text
    x="24" y="36"
    fill="#e6edf3"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="16"
    font-weight="600"
  >Your Name</text>
  <text
    x="24" y="56"
    fill="#8b949e"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12"
  >@username</text>

  <g transform="translate(0, 88)">
    
      <line x1="248" y1="0" x2="248" y2="52" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text
        x="136" y="0"
        text-anchor="middle"
        fill="#e6edf3"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="30"
        font-weight="700"
        letter-spacing="-0.5"
      >4.8k</text>
      <text
        x="136" y="24"
        text-anchor="middle"
        fill="#8b949e"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="0.2"
